log:
  format: json
  level: info
  console_colored: false
  trace: fatal
  with_caller: false
  with_stack_trace: false
ops:
  enabled: false
  network: tcp
  tracing_enabled: false
  metrics:
    enabled: false
    path: /metrics
    port: "10000"
    basic_auth:
      enabled: false
      username: ""
      password: ""
  healthy:
    enabled: false
    path: /healthy
    port: "10000"
    livenesspath: /livez
    readinesspath: /readyz
  profiler:
    enabled: false
    path: /debug/pprof
    port: "10000"
    write_timeout: 60
server:
  addr: :8080
  allowed_origins: []
  tls:
    cert_file: ""
    key_file: ""
postgres:
  host: localhost
  port: "5432"
  database: ""
  username: ""
  password: ""
  ssl_mode: disable
auth:
  access_token_ttl: 20m0s
  refresh_token_ttl: 720h0m0s
  access_token_secret_key: ""
  refresh_token_secret_key: ""
  argon2_server:
    t: 3
    m_kib: 65536
    p: 1
  rate_limits:
    auth_login_per_email_per_min: 5
    auth_login_per_ip_per_min: 20
    kdf_params_per_ip_per_min: 30
    register_per_ip_per_hour: 5
webauthn:
  rp_id: ""
  rp_name: Oblivio
  rp_origin: ""
jobs:
  audit_chain_verify_cron: 0 3 * * *
  rate_limit_gc_interval: 1h0m0s
  sessions_gc_interval: 1h0m0s
email:
  provider: ""
  from: ""
  smtp:
    host: ""
    port: 587
    username: ""
    password: ""
