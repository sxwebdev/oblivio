syntax = "proto3";

package oblivio.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/sxwebdev/oblivio/internal/api/pb/oblivio/v1;oblivio_v1";

// Argon2Params describes Argon2id parameters used by the client to derive
// master_key from master_password. These are stored per-user on the server and
// returned during login so the client can re-derive the same key.
message Argon2Params {
  uint32 t = 1;        // iterations
  uint32 m_kib = 2;    // memory in KiB
  uint32 p = 3;        // parallelism
  string algo = 4;     // "argon2id" (other values reserved for future)
}

// DeviceInfo annotates a session with client-supplied identifiers.
// The server never trusts these fields for authorization, only for UX
// (session listing) and audit.
message DeviceInfo {
  string device_id = 1;   // stable identifier generated by the client
  string device_type = 2; // web | ios | android | desktop | extension
  string device_name = 3; // human-readable name (browser/OS)
}

// AuthPayload is what the server returns after a successful authorization.
// `verifier` and `wrapped_vault_key` allow the client to bootstrap its
// key tree without an extra round-trip.
message AuthPayload {
  string access_token = 1;
  string refresh_token = 2;
  google.protobuf.Timestamp access_expires_at = 3;
  google.protobuf.Timestamp refresh_expires_at = 4;
  string device_id = 5;
  bytes verifier = 6;
  bytes wrapped_vault_key = 7;
  uint32 vault_key_version = 8;
}
