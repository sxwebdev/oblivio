syntax = "proto3";

package oblivio.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/sxwebdev/oblivio/internal/api/pb/oblivio/v1;oblivio_v1";

// WebAuthnService handles passkey / FIDO2 enrolment and authentication.
//
// The server uses github.com/go-webauthn/webauthn for the heavy lifting;
// challenge/options/assertion payloads are forwarded as opaque JSON so the
// service contract stays stable as the library evolves.
service WebAuthnService {
  // Begin a registration ceremony. Returns the CredentialCreationOptions
  // payload that the client passes to `navigator.credentials.create`.
  rpc RegisterBegin(RegisterBeginRequest) returns (RegisterBeginResponse);
  // Finish registration with the attestation produced by the authenticator.
  rpc RegisterFinish(RegisterFinishRequest) returns (RegisterFinishResponse);

  // List the user's registered credentials (metadata only — no public keys).
  rpc ListCredentials(ListCredentialsRequest) returns (ListCredentialsResponse);
  // Remove a credential by its UUID.
  rpc RemoveCredential(RemoveCredentialRequest) returns (RemoveCredentialResponse);

  // BeginAssertion seeds an authenticated user's challenge for a one-shot
  // re-authentication via passkey. Used by LoginTOTPService.Disable when
  // the user has lost their authenticator app and wants to fall back to
  // their passkey to switch off TOTP.
  rpc BeginAssertion(BeginAssertionRequest) returns (BeginAssertionResponse);
}

message RegisterBeginRequest {
  // Human-friendly label, shown in ListCredentials. May be reused after
  // a delete; uniqueness is not enforced.
  string credential_name = 1;
}
message RegisterBeginResponse {
  // Identifier for the in-progress ceremony. Client passes it back to
  // RegisterFinish so the server can re-load the original session.
  string session_id = 1;
  // JSON-encoded CredentialCreationOptions per WebAuthn level 2.
  bytes options_json = 2;
}

message RegisterFinishRequest {
  string session_id = 1;
  // The authenticator's AttestationResponse as JSON (already base64url-
  // encoded inside per the WebAuthn spec).
  bytes attestation_json = 2;
}
message RegisterFinishResponse {
  string credential_id = 1;
  string name = 2;
}

message ListCredentialsRequest {}
message ListCredentialsResponse {
  repeated WebAuthnCredential credentials = 1;
}
message WebAuthnCredential {
  string id = 1;
  string name = 2;
  google.protobuf.Timestamp created_at = 3;
  google.protobuf.Timestamp last_used_at = 4;
  repeated string transports = 5;
}

message RemoveCredentialRequest {
  string credential_id = 1;
}
message RemoveCredentialResponse {}

message BeginAssertionRequest {}
message BeginAssertionResponse {
  // Session identifier the caller passes to the service that consumes the
  // assertion (e.g. LoginTOTPService.Disable.mfa_session_id).
  string session_id = 1;
  // JSON-encoded CredentialRequestOptions per WebAuthn level 2.
  bytes options_json = 2;
}
