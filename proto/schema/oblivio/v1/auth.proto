syntax = "proto3";

package oblivio.v1;

import "oblivio/v1/common.proto";

option go_package = "github.com/sxwebdev/oblivio/internal/api/pb/oblivio/v1;oblivio_v1";

// AuthService handles registration, login, refresh and recovery for the
// zero-knowledge oblivio vault. The server never sees master_password,
// master_key, vault_key or item_key — only their derived auth_key, the
// per-user KDF parameters and ciphertext blobs.
service AuthService {
  // Anonymous endpoints.
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc GetKDFParams(GetKDFParamsRequest) returns (GetKDFParamsResponse);
  rpc Authorize(AuthorizeRequest) returns (AuthorizeResponse);
  rpc CompleteMFA(CompleteMFARequest) returns (CompleteMFAResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);

  // Recovery (anonymous).
  rpc GetRecoveryParams(GetRecoveryParamsRequest) returns (GetRecoveryParamsResponse);
  rpc RecoveryStart(RecoveryStartRequest) returns (RecoveryStartResponse);
  rpc RecoveryComplete(RecoveryCompleteRequest) returns (RecoveryCompleteResponse);

  // Email verification (anonymous). VerifyEmail consumes the token from
  // the user's clicked link; ResendVerification re-issues the link when
  // the previous one expired or was lost.
  rpc VerifyEmail(VerifyEmailRequest) returns (VerifyEmailResponse);
  rpc ResendVerification(ResendVerificationRequest) returns (ResendVerificationResponse);

  // Authenticated endpoints.
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc GetMyKeys(GetMyKeysRequest) returns (GetMyKeysResponse);
  rpc ChangeMasterPassword(ChangeMasterPasswordRequest) returns (ChangeMasterPasswordResponse);
}

message RegisterRequest {
  string email = 1;
  // Argon2id parameters chosen by the client (typically t=3,m=128MiB,p=4).
  bytes salt_user = 2;
  Argon2Params kdf_params = 3;
  // auth_key = HKDF-SHA256(master_key, info="oblivio/auth/v2", salt=salt_user).
  // The server hashes auth_key with Argon2id once more before storing.
  bytes auth_key = 4;
  // AES-GCM(master_key, "oblivio-verify"); 33+ bytes (version || nonce || ct || tag).
  bytes verifier = 5;
  // AES-GCM(master_key, vault_key); vault_key is generated client-side.
  bytes wrapped_vault_key = 6;
  // Recovery artefacts derived from recovery_code shown to the user once.
  bytes recovery_salt = 7;
  bytes recovery_wrapped_vault_key = 8;
  // Argon2id(HKDF(recovery_key,"oblivio/auth/v2")) — server stores hashed proof.
  bytes recovery_proof = 9;
  DeviceInfo device_info = 10;
  // Per-user pepper (16+ random bytes) mixed into the blind-index HKDF.
  // Stored alongside salt_user; returned at GetKDFParams so subsequent logins
  // can re-derive K_blind without re-asking the user. See plan §4.4.
  bytes blind_pepper = 11;
}

message RegisterResponse {
  string user_id = 1;
  AuthPayload auth_payload = 2;
}

message GetKDFParamsRequest {
  string email = 1;
}

message GetKDFParamsResponse {
  bytes salt_user = 1;
  Argon2Params kdf_params = 2;
  // Per-user pepper for the blind-index HKDF (plan §4.4). Treated as
  // non-secret: an attacker that already has the salt knows the pepper too,
  // and breaking the index still requires the vault_key.
  bytes blind_pepper = 3;
}

message AuthorizeRequest {
  string email = 1;
  bytes auth_key = 2;
  DeviceInfo device_info = 3;
}

message AuthorizeResponse {
  // Exactly one of these is set. When auth_payload is present the user is
  // signed in; when mfa_challenge is present the client must complete the
  // requested factor and call CompleteMFA.
  AuthPayload auth_payload = 1;
  MFAChallenge mfa_challenge = 2;
}

// MFAChallenge tells the client which factors are required. Both flags can
// be set when the user has both TOTP and WebAuthn enrolled — the client may
// pick any one to satisfy the challenge.
message MFAChallenge {
  string session_id = 1;
  bool totp_required = 2;
  bool webauthn_required = 3;
  // CredentialRequestOptions JSON (subset). Empty when webauthn_required=false.
  bytes webauthn_options_json = 4;
}

message CompleteMFARequest {
  string session_id = 1;
  // Provide ONE of these.
  string totp_code = 2;
  bytes webauthn_assertion_json = 3;
  DeviceInfo device_info = 4;
}

message CompleteMFAResponse {
  AuthPayload auth_payload = 1;
}

message RefreshTokenRequest {
  string refresh_token = 1;
  DeviceInfo device_info = 2;
}

message RefreshTokenResponse {
  AuthPayload auth_payload = 1;
}

message LogoutRequest {}
message LogoutResponse {}

message GetMyKeysRequest {}
message GetMyKeysResponse {
  bytes verifier = 1;
  bytes wrapped_vault_key = 2;
  uint32 vault_key_version = 3;
  // Login-TOTP envelope (AES-GCM under K_login_totp = HKDF(auth_key, ...)).
  // Populated only when the user has TOTP configured. The client uses this
  // at ChangeMasterPassword / RecoveryComplete to re-derive K_login_totp
  // under the new auth_key and upload a re-encrypted envelope so 2FA
  // survives the rotation. Empty when no TOTP is set.
  bytes login_totp_encrypted_secret = 4;
  bytes login_totp_nonce = 5;
}

// --- Recovery flow (plan §5.5) -----------------------------------------

message GetRecoveryParamsRequest {
  string email = 1;
}
message GetRecoveryParamsResponse {
  // Recovery KDF params currently mirror the master_key params; we keep them
  // in a separate field so they can diverge later if we move to a faster KDF
  // for recovery codes specifically.
  bytes recovery_salt = 1;
  Argon2Params kdf_params = 2;
}

message RecoveryStartRequest {
  string email = 1;
  // recovery_proof = HKDF(recovery_key, "oblivio/auth/v1").
  bytes recovery_proof = 2;
}
message RecoveryStartResponse {
  // recovery_session_id is a short-lived (15min) handle the client must
  // present to RecoveryComplete. It also gates the rate-limit window so an
  // attacker cannot brute-force recovery codes by hammering RecoveryStart.
  string recovery_session_id = 1;
  bytes recovery_wrapped_vault_key = 2;
}

message RecoveryCompleteRequest {
  string recovery_session_id = 1;
  // New auth artefacts derived from the freshly-chosen master_password.
  bytes salt_user = 2;
  Argon2Params kdf_params = 3;
  bytes auth_key = 4;
  bytes verifier = 5;
  bytes wrapped_vault_key = 6;
  // Optional: re-encrypted login-TOTP envelope under the new K_login_totp.
  // When the recovering client still has access to the TOTP secret it can
  // recover the envelope from GetMyKeys (BEFORE recovery completes) by
  // decrypting with the OLD auth_key, then re-seal here under the new
  // auth_key. When the user lost their authenticator app these fields are
  // empty and the server drops the stored TOTP — the user must set it up
  // again after recovery.
  bytes login_totp_encrypted_secret = 7;
  bytes login_totp_nonce = 8;
}
message RecoveryCompleteResponse {}

// --- Email verification ------------------------------------------------

message VerifyEmailRequest {
  // Raw token from the verification link. Server checks SHA-256(token).
  string token = 1;
}
message VerifyEmailResponse {}

message ResendVerificationRequest {
  string email = 1;
}
message ResendVerificationResponse {}

// --- ChangeMasterPassword (plan §7.2) ----------------------------------
//
// Re-derives the user's KDF params, auth_key, verifier and wrapped_vault_key
// under a freshly-chosen master_password. Records and item ciphertexts are
// NOT touched — only the wrapper around vault_key is rotated. All other
// sessions are revoked; the calling session continues so the user doesn't
// get logged out of the tab they just typed the new password in.
message ChangeMasterPasswordRequest {
  // Proves possession of the OLD master_password.
  bytes old_auth_key = 1;
  // Fresh artefacts derived from the NEW master_password.
  bytes new_auth_key = 2;
  bytes new_salt_user = 3;
  Argon2Params new_kdf_params = 4;
  bytes new_verifier = 5;
  bytes new_wrapped_vault_key = 6;
  // Optional re-encrypted login-TOTP envelope under the new K_login_totp.
  // The client decrypts the old envelope (returned by GetMyKeys) with the
  // OLD auth_key, then seals the secret under the new one. Empty when the
  // user has no TOTP configured. See plan §17.2 — without this rotation
  // path TOTP would silently break when auth_key changes.
  bytes new_login_totp_encrypted_secret = 7;
  bytes new_login_totp_nonce = 8;
  // Optional: clear every passkey-unlock bundle the user enrolled. Use
  // this when the password rotation is driven by a suspected compromise
  // — vault_key itself does not rotate, so a leaked PRF output would
  // still decrypt unless the wrapped blob is gone. The credentials
  // themselves are left in place; only their ability to unlock the
  // vault is revoked.
  bool revoke_passkey_unlocks = 9;
}
message ChangeMasterPasswordResponse {}
